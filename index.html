<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yum-Yum Food Ordering</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">yum-yum </div>

        <nav>
            <a href="#">home</a>
            <a href="#about">about</a>
            <a href="#menu">menu</a>
            <a href="#orders">orders</a>
            <a href="#contact">contact</a>
        </nav>

        <div class="icons">
            🔍 🛒 👤
        </div>
    </header>

    <section class="home">
        <div class="content">
            <h3>Order Online</h3>
            <h1>Delicious Pizza</h1>
            <button>See Menus</button>
        </div>

        <div class="image">
            <img src="https://pngimg.com/uploads/pizza/pizza_PNG44095.png" alt="pizza">
        </div>
    </section>

    <section id="menu" class="menu">
        <h1>Our Menu</h1>

        <div class="menu-container">

            <div class="card">
                <img src="https://pngimg.com/uploads/pizza/pizza_PNG44095.png">
                <h3>Cheese Pizza</h3>
                <p>₹199</p>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://pngimg.com/uploads/burger_sandwich/burger_sandwich_PNG4135.png">
                <h3>Burger</h3>
                <p>₹149</p>
                <button>Add to Cart</button>
            </div>

            <div class="card">
                <img src="https://pngimg.com/uploads/french_fries/french_fries_PNG54.png">
                <h3>French Fries</h3>
                <p>₹99</p>
                <button>Add to Cart</button>
            </div>

        </div>
    </section>

    <section id="contact" class="contact">

        <h1>Contact Us</h1>

        <div class="contact-box">

            <div class="box">
                <h3>Email Address</h3>
                <p>yumyum@gmail.com</p>
            </div>

            <div class="box">
                <h3>Opening Hours</h3>
                <p>07:00 AM - 09:00 PM</p>
            </div>

            <div class="box">
                <h3>Our Address</h3>
                <p>Chennai, India</p>
            </div>

        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
